<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MLB Draft Slot Tracker (2018-2025)</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" />
<style>
  :root {
    --sv-black: #0d0d0d;
    --sv-red: #ff2a22;
    --sv-red-dark: #c8201a;
    --sv-gold: #d4a017;

    --bg: #f4f5f7;
    --bg-lane: #ebedf0;
    --bg-card: #ffffff;

    --text-primary: #18191b;
    --text-secondary: #4b5563;
    --text-tertiary: #6b7280;

    --border-default: #e5e7eb;
    --border-soft: #f0f1f3;

    --over: #10b981;
    --over-bg: #ecfdf5;
    --over-border: #a7f3d0;
    --under: #ef4444;
    --under-bg: #fef2f2;
    --under-border: #fecaca;
    --neutral: #6b7280;
    --neutral-bg: #f3f4f6;

    --font-sans: 'Satoshi', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, .04);
    --shadow: 0 1px 3px rgba(15, 23, 42, .06), 0 4px 12px rgba(15, 23, 42, .04);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-primary); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  body { padding-bottom: 60px; }

  /* topbar */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--sv-black); color: #fff;
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px;
  }
  .topbar .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 900; letter-spacing: -0.01em; font-size: 17px;
  }
  .topbar .brand .dot { width: 10px; height: 10px; border-radius: 2px; background: var(--sv-red); }
  .topbar .brand .sub { font-weight: 500; color: #aab0b8; font-size: 13px; margin-left: 2px; }

  /* hero / search */
  .hero { padding: 18px 20px 12px; }
  .hero h1 { margin: 0 0 4px; font-size: 22px; font-weight: 700; letter-spacing: -0.015em; }
  .hero p { margin: 0 0 14px; color: var(--text-secondary); font-size: 13px; }

  .search-wrap { position: relative; max-width: 560px; }
  .search-input {
    width: 100%;
    background: var(--bg-card); color: var(--text-primary);
    border: 1px solid var(--border-default);
    padding: 12px 14px 12px 42px; border-radius: 999px;
    font-size: 15px; font-family: inherit;
    box-shadow: var(--shadow-sm);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
    background-repeat: no-repeat; background-position: 14px center;
  }
  .search-input:focus { outline: none; border-color: var(--sv-red); box-shadow: 0 0 0 3px rgba(255,42,34,.12); }
  .search-input::placeholder { color: var(--text-tertiary); }

  .search-suggest {
    display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--radius);
    max-height: 320px; overflow-y: auto; z-index: 20;
    box-shadow: var(--shadow);
  }
  .search-suggest.open { display: block; }
  .suggest-item {
    padding: 10px 14px; cursor: pointer; font-size: 14px;
    border-bottom: 1px solid var(--border-soft);
    display: flex; justify-content: space-between; gap: 12px;
  }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover, .suggest-item.active { background: var(--bg); }
  .suggest-item .meta-sm { color: var(--text-tertiary); font-size: 12px; white-space: nowrap; }

  /* filter chips row */
  .quick-row {
    padding: 0 20px 12px;
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .pill {
    background: var(--bg-card); border: 1px solid var(--border-default);
    color: var(--text-secondary); padding: 7px 14px; border-radius: 999px;
    font-size: 13px; font-weight: 500; cursor: pointer; user-select: none;
    transition: border-color .15s, color .15s, background .15s;
  }
  .pill:hover { border-color: var(--text-tertiary); }
  .pill.active { background: var(--sv-black); color: #fff; border-color: var(--sv-black); }
  .pill.pill-over.active { background: var(--over); border-color: var(--over); }
  .pill.pill-under.active { background: var(--under); border-color: var(--under); }
  .pill-divider { width: 1px; height: 20px; background: var(--border-default); margin: 0 4px; }
  .pill-link { background: transparent; border: none; color: var(--text-tertiary); padding: 7px 8px; font-size: 13px; cursor: pointer; }
  .pill-link:hover { color: var(--sv-red); }

  /* filter section (collapsible) */
  .filters-section { padding: 0 20px 16px; }
  .filters-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px;
  }
  .ms { position: relative; }
  .ms-button {
    width: 100%; background: var(--bg-card); color: var(--text-primary);
    border: 1px solid var(--border-default); padding: 10px 36px 10px 14px;
    border-radius: var(--radius-sm); font-size: 14px; font-family: inherit;
    cursor: pointer; text-align: left;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    position: relative; box-shadow: var(--shadow-sm);
  }
  .ms-button::after {
    content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-tertiary); font-size: 11px;
  }
  .ms-button.has-selection { border-color: var(--sv-red); color: var(--sv-red); font-weight: 600; }
  .ms-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; display: block; }
  .ms-panel {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--radius-sm);
    padding: 6px; z-index: 25; max-height: 280px; overflow-y: auto;
    box-shadow: var(--shadow);
  }
  .ms.open .ms-panel { display: block; }
  .ms-actions { display: flex; gap: 6px; padding: 4px 8px 8px; border-bottom: 1px solid var(--border-soft); margin-bottom: 4px; }
  .ms-actions button { background: transparent; color: var(--text-tertiary); border: none; cursor: pointer; font-size: 12px; padding: 2px 4px; font-family: inherit; }
  .ms-actions button:hover { color: var(--sv-red); }
  .ms-option {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: pointer;
    font-size: 14px; border-radius: 4px; white-space: nowrap;
  }
  .ms-option:hover { background: var(--bg); }
  .ms-option input { margin: 0; cursor: pointer; accent-color: var(--sv-red); }

  /* results meta */
  .results-meta {
    padding: 8px 20px 12px; color: var(--text-tertiary); font-size: 12px;
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .results-meta .count { color: var(--text-primary); font-weight: 600; }

  /* CARDS (mobile/default) */
  .card-list { padding: 0 14px; display: flex; flex-direction: column; gap: 10px; }
  .pick-card {
    background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow-sm);
    display: grid; grid-template-columns: 4px 1fr; gap: 14px;
    overflow: hidden;
  }
  .pick-card .stripe { background: var(--neutral); border-radius: 2px; margin: -14px 0 -14px -16px; }
  .pick-card.over .stripe { background: var(--over); }
  .pick-card.under .stripe { background: var(--under); }
  .pick-card .body { min-width: 0; }
  .pick-card .row1 { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .pick-card .name { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pick-card .team-tag { font-size: 11px; color: var(--text-tertiary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; text-align: right; white-space: nowrap; flex-shrink: 0; max-width: 40%; overflow: hidden; text-overflow: ellipsis; }
  .pick-card .meta { color: var(--text-secondary); font-size: 13px; margin-top: 4px; display: flex; flex-wrap: wrap; gap: 6px 10px; }
  .pick-card .meta .sep { color: var(--border-default); }
  .pick-card .meta .pos { color: var(--text-primary); font-weight: 600; }
  .pick-card .nums { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 12px; }
  .pick-card .num-cell { background: var(--bg); border-radius: var(--radius-sm); padding: 8px 10px; }
  .pick-card .num-cell .label { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .pick-card .num-cell .val { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; letter-spacing: -0.01em; }
  .pick-card .num-cell.diff-over { background: var(--over-bg); border: 1px solid var(--over-border); }
  .pick-card .num-cell.diff-over .val { color: var(--over); }
  .pick-card .num-cell.diff-under { background: var(--under-bg); border: 1px solid var(--under-border); }
  .pick-card .num-cell.diff-under .val { color: var(--under); }
  .pick-card .num-cell.diff-zero { background: var(--neutral-bg); }

  /* TABLE (desktop) */
  .table-wrap { display: none; padding: 0 20px; }
  .table-frame {
    background: var(--bg-card); border: 1px solid var(--border-default);
    border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm);
  }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-family: var(--font-sans); font-size: 13.5px; font-variant-numeric: tabular-nums; }
  thead th {
    position: sticky; top: 0; background: var(--bg-lane); color: var(--text-secondary);
    text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--border-default);
    cursor: pointer; user-select: none; white-space: nowrap;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  }
  thead th:hover { background: #dfe2e7; color: var(--text-primary); }
  thead th .arrow { color: var(--sv-red); margin-left: 4px; font-size: 11px; }
  tbody td {
    padding: 12px 14px; border-bottom: 1px solid var(--border-soft);
    background: var(--bg-card); color: var(--text-primary);
    font-size: 13.5px; font-weight: 500; white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg); }
  td.num { text-align: right; }
  td.player { font-weight: 700; }
  td.diff-pos { color: var(--over); font-weight: 700; }
  td.diff-neg { color: var(--under); font-weight: 700; }
  td.diff-zero { color: var(--text-tertiary); }

  /* legend */
  .legend { font-size: 12px; color: var(--text-tertiary); display: flex; gap: 14px; }
  .legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; vertical-align: middle; margin-right: 6px; }
  .legend .dot-over { background: var(--over); }
  .legend .dot-under { background: var(--under); }

  /* show more */
  .show-more { padding: 12px 20px 24px; text-align: center; color: var(--text-tertiary); font-size: 13px; }

  /* desktop layout */
  @media (min-width: 900px) {
    .topbar { padding: 14px 28px; }
    .hero { padding: 24px 28px 16px; }
    .hero h1 { font-size: 26px; }
    .quick-row { padding: 0 28px 14px; }
    .filters-section { padding: 0 28px 16px; }
    .results-meta { padding: 8px 28px 12px; }
    .card-list { display: none; }
    .table-wrap { display: block; padding: 0 28px 24px; }
    .show-more { padding: 16px 28px 32px; }
  }

  /* mobile */
  @media (max-width: 899px) {
    .filters-section { display: none; }
    .filters-section.open { display: block; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span>SV Draft Slots <span class="sub">2018–2025</span></div>
</div>

<div class="hero">
  <h1>Over and under slot, by pick</h1>
  <p>R1-10 slots from MLB Stats API; R11+ uses each year's bonus-pool threshold ($125K through 2022, $150K from 2023 on).</p>
  <div class="search-wrap">
    <input id="f-search" class="search-input" type="search" autocomplete="off"
           placeholder="Search a player or school" />
    <div id="suggest" class="search-suggest"></div>
  </div>
</div>

<div class="quick-row" id="quick-row">
  <div class="pill pill-over" data-slot-filter="over">Over slot</div>
  <div class="pill pill-under" data-slot-filter="under">Under slot</div>
  <div class="pill" data-slot-filter="signed">Signed only</div>
  <div class="pill-divider"></div>
  <button class="pill" id="toggle-filters" type="button">Filters ▾</button>
  <button class="pill-link" id="clear">Clear all</button>
</div>

<div class="filters-section" id="filters-section">
  <div class="filters-grid" id="filters-grid"></div>
</div>

<div class="results-meta">
  <div><span class="count" id="row-count">0</span> picks shown</div>
  <div class="legend">
    <span><span class="dot dot-over"></span>over slot</span>
    <span><span class="dot dot-under"></span>under slot</span>
  </div>
</div>

<!-- mobile: card list -->
<div class="card-list" id="card-list"></div>

<!-- desktop: table -->
<div class="table-wrap">
  <div class="table-frame">
    <table id="grid">
      <thead><tr></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="show-more" id="show-more"></div>

<script>
const COLS = [
  { key: 'year',         label: 'Year',   type: 'num' },
  { key: 'draftRound',   label: 'Rd',     type: 'num' },
  { key: 'overall',      label: 'Pick',   type: 'num' },
  { key: 'fullName',     label: 'Player', type: 'str', cls: 'player' },
  { key: 'bonus_num',    label: 'Bonus',  type: 'num', fmt: 'money' },
  { key: 'slot_num',     label: 'Slot',   type: 'num', fmt: 'money' },
  { key: 'diff_num',     label: 'Diff',   type: 'num', fmt: 'money', diff: true },
  { key: 'pos_primary',  label: 'Pos',    type: 'str' },
  { key: 'pos_secondary',label: 'Pos 2',  type: 'str' },
  { key: 'teamname',     label: 'Team',   type: 'str' },
  { key: 'College or HS',label: 'C/HS',   type: 'str' },
  { key: 'colleges3',    label: 'School', type: 'str' },
];

const MS_FILTERS = [
  { id: 'year',  label: 'Year',  source: d => d.year,          numeric: true,  desc: true },
  { id: 'team',  label: 'Team',  source: d => d.teamname,      numeric: false },
  { id: 'round', label: 'Round', source: d => d.draftRound,    numeric: true },
  { id: 'pos1',  label: 'Position',         source: d => d.pos_primary },
  { id: 'pos2',  label: 'Secondary Pos',    source: d => d.pos_secondary || '(none)' },
  { id: 'coll',  label: 'College / HS',     source: d => d['College or HS'] },
];

let DATA = [];
let view = [];
let sortKey = 'year';
let sortDir = -1;
let slotFilters = new Set();
const msState = {};
const CAP = 200; // cards per page
let renderedCount = CAP;

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  const header = rows.shift();
  return rows.filter(r => r.length === header.length).map(r => {
    const o = {};
    header.forEach((h, i) => o[h] = r[i]);
    return o;
  });
}

function parseMoney(s) {
  if (s == null) return null;
  s = String(s).replace(/[,$\s]/g, '');
  if (!s || s === '-') return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function fmtMoneyFull(n) {
  if (n == null || isNaN(n)) return '—';
  const sign = n < 0 ? '−' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-US');
}

function fmtMoneyShort(n) {
  if (n == null || isNaN(n)) return '—';
  const sign = n < 0 ? '−' : '';
  const a = Math.abs(n);
  if (a >= 1_000_000) return sign + '$' + (a / 1_000_000).toFixed(a >= 10_000_000 ? 1 : 2).replace(/\.?0+$/, '') + 'M';
  if (a >= 1_000) return sign + '$' + Math.round(a / 1_000) + 'K';
  return sign + '$' + a;
}

function splitPos(raw) {
  if (!raw) return { primary: '', secondary: '' };
  const parts = String(raw).toUpperCase().split('-').map(s => s.trim()).filter(Boolean);
  return { primary: parts[0] || '', secondary: parts[1] || '' };
}

function uniq(arr) { return [...new Set(arr)].filter(x => x != null && x !== ''); }

function buildHeader() {
  const tr = document.querySelector('thead tr');
  tr.innerHTML = '';
  COLS.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c.label;
    th.dataset.key = c.key;
    th.addEventListener('click', () => {
      if (sortKey === c.key) sortDir = -sortDir;
      else { sortKey = c.key; sortDir = c.type === 'num' ? -1 : 1; }
      render();
    });
    tr.appendChild(th);
  });
}

function buildMultiSelects() {
  const grid = document.getElementById('filters-grid');
  for (const f of MS_FILTERS) {
    msState[f.id] = new Set();
    const values = uniq(DATA.map(f.source));
    values.sort((a, b) => {
      if (f.numeric) {
        const an = +a, bn = +b;
        if (!isNaN(an) && !isNaN(bn)) return f.desc ? bn - an : an - bn;
      }
      return String(a).localeCompare(String(b));
    });

    const wrap = document.createElement('div');
    const lbl = document.createElement('span');
    lbl.className = 'ms-label';
    lbl.textContent = f.label;
    wrap.appendChild(lbl);

    const ms = document.createElement('div');
    ms.className = 'ms';
    ms.dataset.id = f.id;

    const btn = document.createElement('button');
    btn.className = 'ms-button';
    btn.type = 'button';
    btn.textContent = 'All';
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.ms.open').forEach(o => { if (o !== ms) o.classList.remove('open'); });
      ms.classList.toggle('open');
    });

    const panel = document.createElement('div');
    panel.className = 'ms-panel';

    const actions = document.createElement('div');
    actions.className = 'ms-actions';
    const selAll = document.createElement('button');
    selAll.textContent = 'Select all';
    selAll.addEventListener('click', () => { values.forEach(v => msState[f.id].add(String(v))); syncMS(f.id); render(); });
    const clr = document.createElement('button');
    clr.textContent = 'Clear';
    clr.addEventListener('click', () => { msState[f.id].clear(); syncMS(f.id); render(); });
    actions.appendChild(selAll);
    actions.appendChild(clr);
    panel.appendChild(actions);

    for (const v of values) {
      const opt = document.createElement('label');
      opt.className = 'ms-option';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = String(v);
      cb.addEventListener('change', () => {
        if (cb.checked) msState[f.id].add(String(v));
        else msState[f.id].delete(String(v));
        syncMS(f.id);
        render();
      });
      const txt = document.createElement('span');
      txt.textContent = v;
      opt.appendChild(cb);
      opt.appendChild(txt);
      panel.appendChild(opt);
    }

    ms.appendChild(btn);
    ms.appendChild(panel);
    wrap.appendChild(ms);
    grid.appendChild(wrap);
  }

  document.addEventListener('click', (e) => {
    document.querySelectorAll('.ms.open').forEach(ms => {
      if (!ms.contains(e.target)) ms.classList.remove('open');
    });
  });
}

function syncMS(id) {
  const ms = document.querySelector(`.ms[data-id="${id}"]`);
  if (!ms) return;
  const btn = ms.querySelector('.ms-button');
  const sel = msState[id];
  if (sel.size === 0) { btn.textContent = 'All'; btn.classList.remove('has-selection'); }
  else if (sel.size <= 2) { btn.textContent = [...sel].join(', '); btn.classList.add('has-selection'); }
  else { btn.textContent = `${sel.size} selected`; btn.classList.add('has-selection'); }
  ms.querySelectorAll('.ms-option input').forEach(cb => { cb.checked = sel.has(cb.value); });
}

function applyFilters() {
  const text = document.getElementById('f-search').value.toLowerCase().trim();
  view = DATA.filter(d => {
    for (const f of MS_FILTERS) {
      const sel = msState[f.id];
      if (sel.size > 0) {
        const v = String(f.source(d));
        if (!sel.has(v)) return false;
      }
    }
    if (text) {
      const hay = (d.fullName + ' ' + (d.colleges3 || '') + ' ' + (d.hsName || '')).toLowerCase();
      if (!hay.includes(text)) return false;
    }
    if (slotFilters.has('over') && !(d.diff_num > 0)) return false;
    if (slotFilters.has('under') && !(d.diff_num < 0)) return false;
    if (slotFilters.has('signed') && d.bonus_num == null) return false;
    return true;
  });
}

function sortView() {
  const col = COLS.find(c => c.key === sortKey);
  view.sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (col && col.type === 'num') {
      av = av == null || av === '' ? -Infinity : +av;
      bv = bv == null || bv === '' ? -Infinity : +bv;
      if (isNaN(av)) av = -Infinity;
      if (isNaN(bv)) bv = -Infinity;
      return (av - bv) * sortDir;
    }
    return String(av || '').localeCompare(String(bv || '')) * sortDir;
  });
}

function diffClass(n) {
  if (n == null) return '';
  if (n > 0) return 'over';
  if (n < 0) return 'under';
  return 'zero';
}

function renderCards(rows) {
  const list = document.getElementById('card-list');
  list.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (const d of rows) {
    const card = document.createElement('div');
    const dc = diffClass(d.diff_num);
    card.className = 'pick-card ' + dc;
    card.innerHTML = `
      <div class="stripe"></div>
      <div class="body">
        <div class="row1">
          <div class="name">${escapeHtml(d.fullName)}</div>
          <div class="team-tag">${escapeHtml(d.teamname || '')}</div>
        </div>
        <div class="meta">
          <span class="pos">${escapeHtml(d.pos_primary || '—')}${d.pos_secondary ? ' / ' + escapeHtml(d.pos_secondary) : ''}</span>
          <span class="sep">·</span>
          <span>${escapeHtml(d.year)} · R${escapeHtml(d.draftRound)} · #${escapeHtml(d.overall)}</span>
          <span class="sep">·</span>
          <span>${escapeHtml(d.colleges3 || d.hsName || '—')}</span>
        </div>
        <div class="nums">
          <div class="num-cell">
            <div class="label">Bonus</div>
            <div class="val">${fmtMoneyShort(d.bonus_num)}</div>
          </div>
          <div class="num-cell">
            <div class="label">Slot</div>
            <div class="val">${fmtMoneyShort(d.slot_num)}</div>
          </div>
          <div class="num-cell diff-${dc || 'zero'}">
            <div class="label">${dc === 'over' ? 'Over' : dc === 'under' ? 'Under' : 'Diff'}</div>
            <div class="val">${fmtMoneyShort(d.diff_num)}</div>
          </div>
        </div>
      </div>
    `;
    frag.appendChild(card);
  }
  list.appendChild(frag);
}

function renderTable(rows) {
  const tbody = document.querySelector('tbody');
  const frag = document.createDocumentFragment();
  for (const d of rows) {
    const tr = document.createElement('tr');
    for (const c of COLS) {
      const td = document.createElement('td');
      let val = d[c.key];
      if (c.fmt === 'money') {
        const n = c.key === 'diff_num' ? d.diff_num : (c.key === 'bonus_num' ? d.bonus_num : d.slot_num);
        td.textContent = n == null ? '' : fmtMoneyFull(n);
        td.classList.add('num');
        if (c.diff && n != null) {
          if (n > 0) td.classList.add('diff-pos');
          else if (n < 0) td.classList.add('diff-neg');
          else td.classList.add('diff-zero');
        }
      } else if (c.type === 'num') {
        td.textContent = val == null ? '' : val;
        td.classList.add('num');
      } else {
        td.textContent = val == null ? '' : val;
      }
      if (c.cls) td.classList.add(c.cls);
      tr.appendChild(td);
    }
    frag.appendChild(tr);
  }
  tbody.innerHTML = '';
  tbody.appendChild(frag);
}

function render() {
  applyFilters();
  sortView();

  document.querySelectorAll('thead th').forEach(th => {
    const k = th.dataset.key;
    const base = COLS.find(c => c.key === k).label;
    th.innerHTML = base + (k === sortKey ? ` <span class="arrow">${sortDir > 0 ? '▲' : '▼'}</span>` : '');
  });

  document.getElementById('row-count').textContent = view.length.toLocaleString();

  renderedCount = CAP;
  const slice = view.slice(0, renderedCount);
  renderCards(slice);
  renderTable(slice);

  const sm = document.getElementById('show-more');
  if (view.length > renderedCount) {
    sm.innerHTML = `<button class="pill" id="load-more" type="button">Show more (${(view.length - renderedCount).toLocaleString()} remaining)</button>`;
    document.getElementById('load-more').addEventListener('click', loadMore);
  } else {
    sm.textContent = view.length === 0 ? 'No picks match these filters.' : '';
  }
}

function loadMore() {
  renderedCount = Math.min(renderedCount + CAP, view.length);
  const slice = view.slice(0, renderedCount);
  renderCards(slice);
  renderTable(slice);
  const sm = document.getElementById('show-more');
  if (view.length > renderedCount) {
    sm.innerHTML = `<button class="pill" id="load-more" type="button">Show more (${(view.length - renderedCount).toLocaleString()} remaining)</button>`;
    document.getElementById('load-more').addEventListener('click', loadMore);
  } else {
    sm.textContent = '';
  }
}

function renderSuggestions() {
  const q = document.getElementById('f-search').value.toLowerCase().trim();
  const box = document.getElementById('suggest');
  if (q.length < 2) { box.classList.remove('open'); box.innerHTML = ''; return; }
  const scored = [];
  for (const d of DATA) {
    const name = (d.fullName || '').toLowerCase();
    const school = (d.colleges3 || '').toLowerCase();
    const hs = (d.hsName || '').toLowerCase();
    let s = 0;
    if (name.startsWith(q)) s = 3;
    else if (name.includes(q)) s = 2;
    else if (school.includes(q) || hs.includes(q)) s = 1;
    if (s > 0) scored.push({ d, s });
  }
  scored.sort((a, b) => b.s - a.s || (+b.d.year - +a.d.year));
  const top = scored.slice(0, 10);
  if (!top.length) { box.classList.remove('open'); box.innerHTML = ''; return; }
  box.innerHTML = '';
  top.forEach((row, i) => {
    const item = document.createElement('div');
    item.className = 'suggest-item' + (i === 0 ? ' active' : '');
    const left = document.createElement('div');
    left.innerHTML = `<div style="font-weight:600">${escapeHtml(row.d.fullName)}</div><div class="meta-sm">${escapeHtml(row.d.colleges3 || row.d.hsName || '')} · ${escapeHtml(row.d.posit || '')}</div>`;
    const right = document.createElement('div');
    right.className = 'meta-sm';
    right.textContent = `${row.d.year} · #${row.d.overall}`;
    item.appendChild(left);
    item.appendChild(right);
    item.addEventListener('mousedown', (e) => {
      e.preventDefault();
      document.getElementById('f-search').value = row.d.fullName;
      box.classList.remove('open');
      render();
    });
    box.appendChild(item);
  });
  box.classList.add('open');
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

async function init() {
  const resp = await fetch('data.csv');
  const text = await resp.text();
  const rows = parseCSV(text);
  DATA = rows.map(r => {
    r.bonus_num = parseMoney(r.bonus);
    r.slot_num = parseMoney(r.slot_bonus);
    r.diff_num = parseMoney(r.difference);
    const sp = splitPos(r.posit);
    r.pos_primary = sp.primary;
    r.pos_secondary = sp.secondary;
    return r;
  });

  buildHeader();
  buildMultiSelects();

  const searchEl = document.getElementById('f-search');
  searchEl.addEventListener('input', () => { renderSuggestions(); render(); });
  searchEl.addEventListener('focus', renderSuggestions);
  searchEl.addEventListener('blur', () => setTimeout(() => document.getElementById('suggest').classList.remove('open'), 150));
  searchEl.addEventListener('keydown', (e) => {
    const box = document.getElementById('suggest');
    if (!box.classList.contains('open')) return;
    const items = [...box.querySelectorAll('.suggest-item')];
    const idx = items.findIndex(i => i.classList.contains('active'));
    if (e.key === 'ArrowDown') { e.preventDefault(); const n = Math.min(items.length - 1, idx + 1); items.forEach(i => i.classList.remove('active')); items[n].classList.add('active'); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); const n = Math.max(0, idx - 1); items.forEach(i => i.classList.remove('active')); items[n].classList.add('active'); }
    else if (e.key === 'Enter') { e.preventDefault(); if (items[idx]) items[idx].dispatchEvent(new MouseEvent('mousedown')); }
    else if (e.key === 'Escape') { box.classList.remove('open'); }
  });

  document.getElementById('toggle-filters').addEventListener('click', () => {
    const sec = document.getElementById('filters-section');
    sec.classList.toggle('open');
    const btn = document.getElementById('toggle-filters');
    btn.textContent = sec.classList.contains('open') ? 'Filters ▴' : 'Filters ▾';
  });

  document.querySelectorAll('.quick-row .pill[data-slot-filter]').forEach(pill => {
    pill.addEventListener('click', () => {
      const k = pill.dataset.slotFilter;
      if (k === 'over' || k === 'under') {
        const other = k === 'over' ? 'under' : 'over';
        slotFilters.delete(other);
        document.querySelector(`.pill[data-slot-filter="${other}"]`).classList.remove('active');
      }
      if (slotFilters.has(k)) { slotFilters.delete(k); pill.classList.remove('active'); }
      else { slotFilters.add(k); pill.classList.add('active'); }
      render();
    });
  });

  document.getElementById('clear').addEventListener('click', () => {
    Object.keys(msState).forEach(id => { msState[id].clear(); syncMS(id); });
    document.getElementById('f-search').value = '';
    slotFilters.clear();
    document.querySelectorAll('.pill[data-slot-filter]').forEach(p => p.classList.remove('active'));
    document.getElementById('suggest').classList.remove('open');
    render();
  });

  render();
}

init();
</script>
</body>
