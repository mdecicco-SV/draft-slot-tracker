<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MLB Draft Slot Tracker (2018-2025)</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f242d;
    --border: #2a313c;
    --text: #e6e8ec;
    --muted: #8b94a3;
    --accent: #6aa9ff;
    --over: #4ade80;
    --under: #ff6b6b;
    --neutral: #8b94a3;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 5; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .filter-toggle { display: none; width: 100%; padding: 10px 20px; background: var(--panel-2); border: none; border-bottom: 1px solid var(--border); color: var(--text); font-size: 13px; text-align: left; cursor: pointer; }
  .filter-toggle:active { background: var(--panel); }
  .filters { display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 20px; background: var(--panel-2); border-bottom: 1px solid var(--border); align-items: flex-end; }
  .filters label { display: flex; flex-direction: column; font-size: 11px; color: var(--muted); gap: 4px; }
  .filters input[type="text"], .filters select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 6px 8px; border-radius: 4px; font-size: 13px; min-width: 180px; }
  .filters .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { background: var(--bg); border: 1px solid var(--border); color: var(--muted); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; user-select: none; }
  .chip.active { color: var(--text); border-color: var(--accent); background: rgba(106,169,255,.1); }

  /* multi-select */
  .ms { position: relative; }
  .ms-button {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 6px 24px 6px 8px; border-radius: 4px; font-size: 13px;
    cursor: pointer; min-width: 130px; text-align: left;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    position: relative;
  }
  .ms-button::after {
    content: '▾'; position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 11px;
  }
  .ms-button.has-selection { border-color: var(--accent); color: var(--accent); }
  .ms-panel {
    display: none; position: absolute; top: calc(100% + 4px); left: 0;
    background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    padding: 6px; z-index: 10; max-height: 280px; overflow-y: auto;
    min-width: 100%; box-shadow: 0 4px 12px rgba(0,0,0,.5);
  }
  .ms.open .ms-panel { display: block; }
  .ms-actions { display: flex; gap: 6px; padding: 4px 6px 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .ms-actions button { background: transparent; color: var(--muted); border: none; cursor: pointer; font-size: 11px; padding: 2px 4px; }
  .ms-actions button:hover { color: var(--accent); }
  .ms-option {
    display: flex; align-items: center; gap: 6px; padding: 4px 8px; cursor: pointer;
    font-size: 13px; border-radius: 3px; white-space: nowrap;
  }
  .ms-option:hover { background: var(--panel-2); }
  .ms-option input { margin: 0; cursor: pointer; }

  .search-bar { display: flex; align-items: center; padding: 10px 20px; background: var(--panel); border-bottom: 1px solid var(--border); gap: 10px; }
  .search-bar .search-input {
    flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border);
    padding: 10px 12px 10px 36px; border-radius: 6px; font-size: 14px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238b94a3' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><line x1='21' y1='21' x2='16.65' y2='16.65'/></svg>");
    background-repeat: no-repeat; background-position: 12px center;
  }
  .search-bar .search-input:focus { outline: none; border-color: var(--accent); }
  .search-bar .search-input::placeholder { color: var(--muted); }
  .search-results { position: relative; }
  .search-suggest {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    max-height: 320px; overflow-y: auto; z-index: 20;
    box-shadow: 0 4px 14px rgba(0,0,0,.5);
  }
  .search-suggest.open { display: block; }
  .suggest-item { padding: 10px 14px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #1c2029; display: flex; justify-content: space-between; gap: 12px; }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover, .suggest-item.active { background: var(--panel-2); }
  .suggest-item .meta-sm { color: var(--muted); font-size: 11px; white-space: nowrap; }

  .meta { padding: 8px 20px; color: var(--muted); font-size: 12px; background: var(--panel-2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; gap: 12px; }
  .table-wrap { overflow: auto; max-height: calc(100vh - 280px); -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { position: sticky; top: 0; background: var(--panel); color: var(--text); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { background: var(--panel-2); }
  thead th .arrow { color: var(--accent); margin-left: 4px; font-size: 11px; }
  tbody td { padding: 8px 12px; border-bottom: 1px solid #1c2029; white-space: nowrap; }
  tbody tr:hover { background: #1a1e26; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.diff-pos { color: var(--over); font-weight: 600; }
  td.diff-neg { color: var(--under); font-weight: 600; }
  td.diff-zero { color: var(--neutral); }
  .clear-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .clear-btn:hover { color: var(--text); border-color: var(--accent); }
  .legend { font-size: 11px; color: var(--muted); }
  .legend .over { color: var(--over); }
  .legend .under { color: var(--under); }

  /* mobile */
  @media (max-width: 720px) {
    header { padding: 10px 14px; }
    header h1 { font-size: 15px; }
    header .sub { display: none; }
    .search-bar { padding: 8px 12px; }
    .filter-toggle { display: block; padding: 10px 14px; }
    .filters { display: none; padding: 10px 14px; gap: 8px; }
    .filters.open { display: flex; flex-direction: column; align-items: stretch; }
    .filters label { width: 100%; font-size: 12px; }
    .filters input[type="text"], .filters select { min-width: 0; width: 100%; padding: 10px; font-size: 14px; }
    .filters .chips { width: 100%; }
    .chip { flex: 1; text-align: center; padding: 10px 8px; }
    .ms-button { width: 100%; min-width: 0; padding: 10px 28px 10px 10px; font-size: 14px; }
    .ms-panel { left: 0; right: 0; min-width: 0; }
    .clear-btn { width: 100%; padding: 10px; font-size: 13px; }
    .meta { padding: 6px 14px; flex-direction: column; gap: 4px; }
    .table-wrap { max-height: calc(100vh - 200px); }
    .table-wrap.filters-open { max-height: calc(100vh - 520px); }
    thead th { padding: 8px 10px; font-size: 12px; }
    tbody td { padding: 8px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<header>
  <h1>MLB Draft Slot Tracker (2018-2025)</h1>
  <div class="sub">Over/under-slot bonuses by pick. R1-10 slots from MLB Stats API; R11+ uses year's pool threshold ($125K 2018-22, $150K 2023-25).</div>
</header>

<div class="search-bar">
  <div class="search-results" style="flex:1; position:relative;">
    <input id="f-search" class="search-input" type="search" autocomplete="off"
           placeholder="Search players or schools — e.g. Skenes, Holliday, LSU" />
    <div id="suggest" class="search-suggest"></div>
  </div>
</div>

<button class="filter-toggle" id="filter-toggle" type="button">Filters ▾</button>

<div class="filters" id="filter-bar">
  <!-- multi-selects mounted by JS -->
  <label style="display:none">hidden anchor
    <input id="f-text" type="hidden" />
  </label>
  <div class="chips">
    <div class="chip" data-slot-filter="over">Over-slot</div>
    <div class="chip" data-slot-filter="under">Under-slot</div>
    <div class="chip" data-slot-filter="signed">Signed only</div>
  </div>
  <button class="clear-btn" id="clear">Clear all</button>
</div>

<div class="meta">
  <div><span id="row-count">0</span> picks shown</div>
  <div class="legend"><span class="over">over-slot (+)</span> &nbsp;|&nbsp; <span class="under">under-slot (&minus;)</span></div>
</div>

<div class="table-wrap">
  <table id="grid">
    <thead><tr></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
const COLS = [
  { key: 'year',         label: 'Year',       type: 'num' },
  { key: 'draftRound',   label: 'Rd',         type: 'num' },
  { key: 'overall',      label: 'Pick',       type: 'num' },
  { key: 'fullName',     label: 'Player',     type: 'str' },
  { key: 'pos_primary',  label: 'Pos1',       type: 'str' },
  { key: 'pos_secondary',label: 'Pos2',       type: 'str' },
  { key: 'teamname',     label: 'Team',       type: 'str' },
  { key: 'College or HS',label: 'C/HS',       type: 'str' },
  { key: 'colleges3',    label: 'School',     type: 'str' },
  { key: 'bonus_num',    label: 'Bonus',      type: 'num', fmt: 'money' },
  { key: 'slot_num',     label: 'Slot',       type: 'num', fmt: 'money' },
  { key: 'diff_num',     label: 'Diff',       type: 'num', fmt: 'money', diff: true },
];

// Multi-select filters: key -> { label, source(d)->value, numeric? }
const MS_FILTERS = [
  { id: 'year',  label: 'Year',  source: d => d.year,          numeric: true,  desc: true },
  { id: 'team',  label: 'Team',  source: d => d.teamname,      numeric: false },
  { id: 'round', label: 'Round', source: d => d.draftRound,    numeric: true },
  { id: 'pos1',  label: 'Pos (Primary)',   source: d => d.pos_primary },
  { id: 'pos2',  label: 'Pos (Secondary)', source: d => d.pos_secondary || '(none)' },
  { id: 'coll',  label: 'College / HS',    source: d => d['College or HS'] },
];

let DATA = [];
let view = [];
let sortKey = 'overall';
let sortDir = 1;
let slotFilters = new Set();
const msState = {}; // id -> Set of selected values

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  const header = rows.shift();
  return rows.filter(r => r.length === header.length).map(r => {
    const o = {};
    header.forEach((h, i) => o[h] = r[i]);
    return o;
  });
}

function parseMoney(s) {
  if (s == null) return null;
  s = String(s).replace(/[,$\s]/g, '');
  if (!s || s === '-') return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function fmtMoney(n) {
  if (n == null || isNaN(n)) return '';
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-US');
}

function splitPos(raw) {
  if (!raw) return { primary: '', secondary: '' };
  const parts = String(raw).toUpperCase().split('-').map(s => s.trim()).filter(Boolean);
  return { primary: parts[0] || '', secondary: parts[1] || '' };
}

function uniq(arr) { return [...new Set(arr)].filter(x => x != null && x !== ''); }

function buildHeader() {
  const tr = document.querySelector('thead tr');
  tr.innerHTML = '';
  COLS.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c.label;
    th.dataset.key = c.key;
    th.addEventListener('click', () => {
      if (sortKey === c.key) sortDir = -sortDir;
      else { sortKey = c.key; sortDir = 1; }
      render();
    });
    tr.appendChild(th);
  });
}

function buildMultiSelects() {
  const bar = document.getElementById('filter-bar');
  const anchor = document.getElementById('f-text').parentElement; // mount before this
  for (const f of MS_FILTERS) {
    msState[f.id] = new Set();
    const values = uniq(DATA.map(f.source));
    values.sort((a, b) => {
      if (f.numeric) {
        const an = +a, bn = +b;
        if (!isNaN(an) && !isNaN(bn)) return f.desc ? bn - an : an - bn;
      }
      return String(a).localeCompare(String(b));
    });

    const wrap = document.createElement('label');
    wrap.textContent = f.label;
    wrap.style.position = 'relative';

    const ms = document.createElement('div');
    ms.className = 'ms';
    ms.dataset.id = f.id;

    const btn = document.createElement('button');
    btn.className = 'ms-button';
    btn.type = 'button';
    btn.textContent = 'All';
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.ms.open').forEach(o => { if (o !== ms) o.classList.remove('open'); });
      ms.classList.toggle('open');
    });

    const panel = document.createElement('div');
    panel.className = 'ms-panel';

    const actions = document.createElement('div');
    actions.className = 'ms-actions';
    const selAll = document.createElement('button');
    selAll.textContent = 'Select all';
    selAll.addEventListener('click', () => { values.forEach(v => msState[f.id].add(String(v))); syncMS(f.id); render(); });
    const clr = document.createElement('button');
    clr.textContent = 'Clear';
    clr.addEventListener('click', () => { msState[f.id].clear(); syncMS(f.id); render(); });
    actions.appendChild(selAll);
    actions.appendChild(clr);
    panel.appendChild(actions);

    for (const v of values) {
      const opt = document.createElement('label');
      opt.className = 'ms-option';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = String(v);
      cb.addEventListener('change', () => {
        if (cb.checked) msState[f.id].add(String(v));
        else msState[f.id].delete(String(v));
        syncMS(f.id);
        render();
      });
      const txt = document.createElement('span');
      txt.textContent = v;
      opt.appendChild(cb);
      opt.appendChild(txt);
      panel.appendChild(opt);
    }

    ms.appendChild(btn);
    ms.appendChild(panel);
    wrap.appendChild(ms);
    bar.insertBefore(wrap, anchor);
  }

  // close panels on outside click
  document.addEventListener('click', (e) => {
    document.querySelectorAll('.ms.open').forEach(ms => {
      if (!ms.contains(e.target)) ms.classList.remove('open');
    });
  });
}

function syncMS(id) {
  const ms = document.querySelector(`.ms[data-id="${id}"]`);
  if (!ms) return;
  const btn = ms.querySelector('.ms-button');
  const sel = msState[id];
  if (sel.size === 0) { btn.textContent = 'All'; btn.classList.remove('has-selection'); }
  else if (sel.size <= 2) { btn.textContent = [...sel].join(', '); btn.classList.add('has-selection'); }
  else { btn.textContent = `${sel.size} selected`; btn.classList.add('has-selection'); }
  // sync checkboxes
  ms.querySelectorAll('.ms-option input').forEach(cb => { cb.checked = sel.has(cb.value); });
}

function applyFilters() {
  const text = document.getElementById('f-search').value.toLowerCase().trim();

  view = DATA.filter(d => {
    for (const f of MS_FILTERS) {
      const sel = msState[f.id];
      if (sel.size > 0) {
        const v = String(f.source(d));
        if (!sel.has(v)) return false;
      }
    }
    if (text) {
      const hay = (d.fullName + ' ' + (d.colleges3 || '') + ' ' + (d.hsName || '')).toLowerCase();
      if (!hay.includes(text)) return false;
    }
    if (slotFilters.has('over') && !(d.diff_num > 0)) return false;
    if (slotFilters.has('under') && !(d.diff_num < 0)) return false;
    if (slotFilters.has('signed') && d.bonus_num == null) return false;
    return true;
  });
}

function renderSuggestions() {
  const q = document.getElementById('f-search').value.toLowerCase().trim();
  const box = document.getElementById('suggest');
  if (q.length < 2) { box.classList.remove('open'); box.innerHTML = ''; return; }
  // Rank matches: startsWith name > contains name > contains school
  const scored = [];
  for (const d of DATA) {
    const name = (d.fullName || '').toLowerCase();
    const school = (d.colleges3 || '').toLowerCase();
    const hs = (d.hsName || '').toLowerCase();
    let s = 0;
    if (name.startsWith(q)) s = 3;
    else if (name.includes(q)) s = 2;
    else if (school.includes(q) || hs.includes(q)) s = 1;
    if (s > 0) scored.push({ d, s });
  }
  scored.sort((a, b) => b.s - a.s || (+b.d.year - +a.d.year));
  const top = scored.slice(0, 10);
  if (!top.length) { box.classList.remove('open'); box.innerHTML = ''; return; }
  box.innerHTML = '';
  top.forEach((row, i) => {
    const item = document.createElement('div');
    item.className = 'suggest-item' + (i === 0 ? ' active' : '');
    const left = document.createElement('div');
    left.innerHTML = `<div>${escapeHtml(row.d.fullName)}</div><div class="meta-sm">${escapeHtml(row.d.colleges3 || row.d.hsName || '')} &middot; ${escapeHtml(row.d.posit || '')}</div>`;
    const right = document.createElement('div');
    right.className = 'meta-sm';
    right.textContent = `${row.d.year} · #${row.d.overall}`;
    item.appendChild(left);
    item.appendChild(right);
    item.addEventListener('mousedown', (e) => {
      e.preventDefault();
      document.getElementById('f-search').value = row.d.fullName;
      box.classList.remove('open');
      render();
    });
    box.appendChild(item);
  });
  box.classList.add('open');
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function sortView() {
  const col = COLS.find(c => c.key === sortKey);
  view.sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (col && col.type === 'num') {
      av = av == null || av === '' ? -Infinity : +av;
      bv = bv == null || bv === '' ? -Infinity : +bv;
      if (isNaN(av)) av = -Infinity;
      if (isNaN(bv)) bv = -Infinity;
      return (av - bv) * sortDir;
    }
    return String(av || '').localeCompare(String(bv || '')) * sortDir;
  });
}

function render() {
  applyFilters();
  sortView();

  document.querySelectorAll('thead th').forEach(th => {
    const k = th.dataset.key;
    const base = COLS.find(c => c.key === k).label;
    th.innerHTML = base + (k === sortKey ? ` <span class="arrow">${sortDir > 0 ? '▲' : '▼'}</span>` : '');
  });

  document.getElementById('row-count').textContent = view.length.toLocaleString();

  const tbody = document.querySelector('tbody');
  const CAP = 1500;
  const slice = view.slice(0, CAP);
  const frag = document.createDocumentFragment();
  for (const d of slice) {
    const tr = document.createElement('tr');
    for (const c of COLS) {
      const td = document.createElement('td');
      let val = d[c.key];
      if (c.fmt === 'money') {
        const n = c.key === 'diff_num' ? d.diff_num : (c.key === 'bonus_num' ? d.bonus_num : d.slot_num);
        td.textContent = n == null ? '' : fmtMoney(n);
        td.className = 'num';
        if (c.diff && n != null) {
          if (n > 0) td.classList.add('diff-pos');
          else if (n < 0) td.classList.add('diff-neg');
          else td.classList.add('diff-zero');
        }
      } else if (c.type === 'num') {
        td.textContent = val == null ? '' : val;
        td.className = 'num';
      } else {
        td.textContent = val == null ? '' : val;
      }
      tr.appendChild(td);
    }
    frag.appendChild(tr);
  }
  tbody.innerHTML = '';
  tbody.appendChild(frag);

  if (view.length > CAP) {
    const note = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = COLS.length;
    td.style.textAlign = 'center';
    td.style.color = 'var(--muted)';
    td.style.padding = '12px';
    td.textContent = `Showing first ${CAP.toLocaleString()} of ${view.length.toLocaleString()} matching picks. Add more filters to narrow.`;
    note.appendChild(td);
    tbody.appendChild(note);
  }
}

async function init() {
  const resp = await fetch('data.csv');
  const text = await resp.text();
  const rows = parseCSV(text);
  DATA = rows.map(r => {
    r.bonus_num = parseMoney(r.bonus);
    r.slot_num = parseMoney(r.slot_bonus);
    r.diff_num = parseMoney(r.difference);
    const sp = splitPos(r.posit);
    r.pos_primary = sp.primary;
    r.pos_secondary = sp.secondary;
    return r;
  });

  buildHeader();
  buildMultiSelects();

  const searchEl = document.getElementById('f-search');
  searchEl.addEventListener('input', () => { renderSuggestions(); render(); });
  searchEl.addEventListener('focus', renderSuggestions);
  searchEl.addEventListener('blur', () => setTimeout(() => document.getElementById('suggest').classList.remove('open'), 150));
  searchEl.addEventListener('keydown', (e) => {
    const box = document.getElementById('suggest');
    if (!box.classList.contains('open')) return;
    const items = [...box.querySelectorAll('.suggest-item')];
    const idx = items.findIndex(i => i.classList.contains('active'));
    if (e.key === 'ArrowDown') { e.preventDefault(); const n = Math.min(items.length - 1, idx + 1); items.forEach(i => i.classList.remove('active')); items[n].classList.add('active'); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); const n = Math.max(0, idx - 1); items.forEach(i => i.classList.remove('active')); items[n].classList.add('active'); }
    else if (e.key === 'Enter') { e.preventDefault(); if (items[idx]) items[idx].dispatchEvent(new MouseEvent('mousedown')); }
    else if (e.key === 'Escape') { box.classList.remove('open'); }
  });

  const ft = document.getElementById('filter-toggle');
  ft.addEventListener('click', () => {
    const bar = document.getElementById('filter-bar');
    bar.classList.toggle('open');
    document.querySelector('.table-wrap').classList.toggle('filters-open', bar.classList.contains('open'));
    ft.textContent = bar.classList.contains('open') ? 'Filters ▴' : 'Filters ▾';
  });

  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const k = chip.dataset.slotFilter;
      if (k === 'over' || k === 'under') {
        const other = k === 'over' ? 'under' : 'over';
        slotFilters.delete(other);
        document.querySelector(`.chip[data-slot-filter="${other}"]`).classList.remove('active');
      }
      if (slotFilters.has(k)) { slotFilters.delete(k); chip.classList.remove('active'); }
      else { slotFilters.add(k); chip.classList.add('active'); }
      render();
    });
  });
  document.getElementById('clear').addEventListener('click', () => {
    Object.keys(msState).forEach(id => { msState[id].clear(); syncMS(id); });
    document.getElementById('f-search').value = '';
    slotFilters.clear();
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    document.getElementById('suggest').classList.remove('open');
    render();
  });

  sortKey = 'year'; sortDir = -1;
  render();
}

init();
</script>
</body>
</html>
