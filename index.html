<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MLB Draft Slot Tracker (2018-2025)</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f242d;
    --border: #2a313c;
    --text: #e6e8ec;
    --muted: #8b94a3;
    --accent: #6aa9ff;
    --over: #ff6b6b;
    --under: #4ade80;
    --neutral: #8b94a3;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 5; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .filters { display: flex; flex-wrap: wrap; gap: 10px; padding: 12px 20px; background: var(--panel-2); border-bottom: 1px solid var(--border); align-items: center; }
  .filters label { display: flex; flex-direction: column; font-size: 11px; color: var(--muted); gap: 4px; }
  .filters input, .filters select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 6px 8px; border-radius: 4px; font-size: 13px; min-width: 110px; }
  .filters input[type="text"] { min-width: 180px; }
  .filters .chips { display: flex; gap: 6px; }
  .chip { background: var(--bg); border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; user-select: none; }
  .chip.active { color: var(--text); border-color: var(--accent); background: rgba(106,169,255,.1); }
  .meta { padding: 8px 20px; color: var(--muted); font-size: 12px; background: var(--panel-2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .table-wrap { overflow: auto; max-height: calc(100vh - 200px); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { position: sticky; top: 0; background: var(--panel); color: var(--text); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  thead th:hover { background: var(--panel-2); }
  thead th .arrow { color: var(--accent); margin-left: 4px; font-size: 11px; }
  tbody td { padding: 8px 12px; border-bottom: 1px solid #1c2029; white-space: nowrap; }
  tbody tr:hover { background: #1a1e26; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.diff-pos { color: var(--over); font-weight: 600; }
  td.diff-neg { color: var(--under); font-weight: 600; }
  td.diff-zero { color: var(--neutral); }
  .clear-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .clear-btn:hover { color: var(--text); border-color: var(--accent); }
  .legend { font-size: 11px; color: var(--muted); }
  .legend .over { color: var(--over); }
  .legend .under { color: var(--under); }
</style>
</head>
<body>
<header>
  <h1>MLB Draft Slot Tracker (2018-2025)</h1>
  <div class="sub">Over/under-slot bonuses by pick. R1-10 slots from MLB Stats API; R11+ uses year's pool threshold ($125K 2018-22, $150K 2023-25).</div>
</header>

<div class="filters">
  <label>Year
    <select id="f-year"><option value="">All</option></select>
  </label>
  <label>Team
    <select id="f-team"><option value="">All</option></select>
  </label>
  <label>Round
    <select id="f-round"><option value="">All</option></select>
  </label>
  <label>Position
    <select id="f-pos"><option value="">All</option></select>
  </label>
  <label>College/HS
    <select id="f-coll"><option value="">All</option></select>
  </label>
  <label>Name / School
    <input id="f-text" type="text" placeholder="search..." />
  </label>
  <div class="chips" style="align-self: flex-end;">
    <div class="chip" data-slot-filter="over">Over-slot</div>
    <div class="chip" data-slot-filter="under">Under-slot</div>
    <div class="chip" data-slot-filter="signed">Signed only</div>
  </div>
  <button class="clear-btn" id="clear">Clear</button>
</div>

<div class="meta">
  <div><span id="row-count">0</span> picks shown</div>
  <div class="legend"><span class="over">over-slot (+)</span> &nbsp;|&nbsp; <span class="under">under-slot (&minus;)</span></div>
</div>

<div class="table-wrap">
  <table id="grid">
    <thead><tr></tr></thead>
    <tbody></tbody>
  </table>
</div>

<script>
const COLS = [
  { key: 'year',        label: 'Year',     type: 'num' },
  { key: 'draftRound',  label: 'Rd',       type: 'num' },
  { key: 'overall',     label: 'Pick',     type: 'num' },
  { key: 'fullName',    label: 'Player',   type: 'str' },
  { key: 'posit',       label: 'Pos',      type: 'str' },
  { key: 'teamname',    label: 'Team',     type: 'str' },
  { key: 'College or HS', label: 'C/HS',   type: 'str' },
  { key: 'colleges3',   label: 'School',   type: 'str' },
  { key: 'bonus_num',   label: 'Bonus',    type: 'num', fmt: 'money' },
  { key: 'slot_num',    label: 'Slot',     type: 'num', fmt: 'money' },
  { key: 'diff_num',    label: 'Diff',     type: 'num', fmt: 'money', diff: true },
];

let DATA = [];
let view = [];
let sortKey = 'overall';
let sortDir = 1;
let slotFilters = new Set();

function parseCSV(text) {
  // Minimal CSV parser supporting quoted fields
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  const header = rows.shift();
  return rows.filter(r => r.length === header.length).map(r => {
    const o = {};
    header.forEach((h, i) => o[h] = r[i]);
    return o;
  });
}

function parseMoney(s) {
  if (s == null) return null;
  s = String(s).replace(/[,$\s]/g, '');
  if (!s || s === '-') return null;
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function fmtMoney(n) {
  if (n == null || isNaN(n)) return '';
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-US');
}

function uniq(arr) { return [...new Set(arr)].filter(x => x != null && x !== ''); }

function buildHeader() {
  const tr = document.querySelector('thead tr');
  tr.innerHTML = '';
  COLS.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c.label;
    th.dataset.key = c.key;
    th.addEventListener('click', () => {
      if (sortKey === c.key) sortDir = -sortDir;
      else { sortKey = c.key; sortDir = c.type === 'num' ? 1 : 1; }
      render();
    });
    tr.appendChild(th);
  });
}

function buildFilters() {
  const years = uniq(DATA.map(d => d.year)).sort((a,b) => +b - +a);
  const teams = uniq(DATA.map(d => d.teamname)).sort();
  const rounds = uniq(DATA.map(d => d.draftRound)).sort((a,b) => {
    const an = +a, bn = +b;
    if (isNaN(an) || isNaN(bn)) return String(a).localeCompare(String(b));
    return an - bn;
  });
  const positions = uniq(DATA.map(d => d.posit)).sort();
  const colls = uniq(DATA.map(d => d['College or HS'])).sort();

  fill('f-year', years);
  fill('f-team', teams);
  fill('f-round', rounds);
  fill('f-pos', positions);
  fill('f-coll', colls);
}

function fill(id, values) {
  const sel = document.getElementById(id);
  values.forEach(v => {
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
}

function applyFilters() {
  const y = document.getElementById('f-year').value;
  const t = document.getElementById('f-team').value;
  const r = document.getElementById('f-round').value;
  const p = document.getElementById('f-pos').value;
  const c = document.getElementById('f-coll').value;
  const text = document.getElementById('f-text').value.toLowerCase().trim();

  view = DATA.filter(d => {
    if (y && d.year !== y) return false;
    if (t && d.teamname !== t) return false;
    if (r && d.draftRound !== r) return false;
    if (p && d.posit !== p) return false;
    if (c && d['College or HS'] !== c) return false;
    if (text) {
      const hay = (d.fullName + ' ' + (d.colleges3 || '') + ' ' + (d.hsName || '')).toLowerCase();
      if (!hay.includes(text)) return false;
    }
    if (slotFilters.has('over') && !(d.diff_num > 0)) return false;
    if (slotFilters.has('under') && !(d.diff_num < 0)) return false;
    if (slotFilters.has('signed') && d.bonus_num == null) return false;
    return true;
  });
}

function sortView() {
  const col = COLS.find(c => c.key === sortKey);
  view.sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (col && col.type === 'num') {
      av = av == null || av === '' ? -Infinity : +av;
      bv = bv == null || bv === '' ? -Infinity : +bv;
      if (isNaN(av)) av = -Infinity;
      if (isNaN(bv)) bv = -Infinity;
      return (av - bv) * sortDir;
    }
    return String(av || '').localeCompare(String(bv || '')) * sortDir;
  });
}

function render() {
  applyFilters();
  sortView();

  // header arrows
  document.querySelectorAll('thead th').forEach(th => {
    const k = th.dataset.key;
    const base = COLS.find(c => c.key === k).label;
    th.innerHTML = base + (k === sortKey ? ` <span class="arrow">${sortDir > 0 ? '▲' : '▼'}</span>` : '');
  });

  document.getElementById('row-count').textContent = view.length.toLocaleString();

  const tbody = document.querySelector('tbody');
  // Virtual-ish: cap at 1000 rows rendered for snappiness; show count.
  const CAP = 1500;
  const slice = view.slice(0, CAP);
  const frag = document.createDocumentFragment();
  for (const d of slice) {
    const tr = document.createElement('tr');
    for (const c of COLS) {
      const td = document.createElement('td');
      let val = d[c.key];
      if (c.fmt === 'money') {
        const n = c.key === 'diff_num' ? d.diff_num : (c.key === 'bonus_num' ? d.bonus_num : d.slot_num);
        td.textContent = n == null ? '' : fmtMoney(n);
        td.className = 'num';
        if (c.diff && n != null) {
          if (n > 0) td.classList.add('diff-pos');
          else if (n < 0) td.classList.add('diff-neg');
          else td.classList.add('diff-zero');
        }
      } else if (c.type === 'num') {
        td.textContent = val == null ? '' : val;
        td.className = 'num';
      } else {
        td.textContent = val == null ? '' : val;
      }
      tr.appendChild(td);
    }
    frag.appendChild(tr);
  }
  tbody.innerHTML = '';
  tbody.appendChild(frag);

  if (view.length > CAP) {
    const note = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = COLS.length;
    td.style.textAlign = 'center';
    td.style.color = 'var(--muted)';
    td.style.padding = '12px';
    td.textContent = `Showing first ${CAP.toLocaleString()} of ${view.length.toLocaleString()} matching picks. Add more filters to narrow.`;
    note.appendChild(td);
    tbody.appendChild(note);
  }
}

async function init() {
  const resp = await fetch('data.csv');
  const text = await resp.text();
  const rows = parseCSV(text);
  DATA = rows.map(r => {
    r.bonus_num = parseMoney(r.bonus);
    r.slot_num = parseMoney(r.slot_bonus);
    r.diff_num = parseMoney(r.difference);
    return r;
  });

  buildHeader();
  buildFilters();

  ['f-year', 'f-team', 'f-round', 'f-pos', 'f-coll'].forEach(id => {
    document.getElementById(id).addEventListener('change', render);
  });
  document.getElementById('f-text').addEventListener('input', render);
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const k = chip.dataset.slotFilter;
      // over and under are mutually exclusive
      if (k === 'over' || k === 'under') {
        const other = k === 'over' ? 'under' : 'over';
        slotFilters.delete(other);
        document.querySelector(`.chip[data-slot-filter="${other}"]`).classList.remove('active');
      }
      if (slotFilters.has(k)) { slotFilters.delete(k); chip.classList.remove('active'); }
      else { slotFilters.add(k); chip.classList.add('active'); }
      render();
    });
  });
  document.getElementById('clear').addEventListener('click', () => {
    ['f-year','f-team','f-round','f-pos','f-coll'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-text').value = '';
    slotFilters.clear();
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    render();
  });

  // default sort
  sortKey = 'year'; sortDir = -1;
  render();
}

init();
</script>
</body>
</html>
